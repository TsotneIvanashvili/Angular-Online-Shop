<div class="nope">
  <nav appScrolling>
    <div class="mainh1">
      <i routerLink="/" class="fa-solid fa-desktop fa-2xl laptop"></i>
      <h1 class="adzin" routerLink="/">TechStore</h1>
    </div>

    <button
      class="burger"
      type="button"
      [class.active]="isMenuOpen"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
    >
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </button>

    <div class="pages" [class.active]="isMenuOpen">
      <ul>
        <li
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
        >
          Home
        </li>
        <li routerLink="/shop" routerLinkActive="active" (click)="closeMenu()">Shop</li>
        <li routerLink="/cart" routerLinkActive="active" (click)="closeMenu()">Cart</li>
      </ul>
    </div>

    <div class="account" [class.active]="isMenuOpen">
      @if (!isLoggedIn) {
        <button routerLink="/register" (click)="closeMenu()">
          <i class="fa-solid fa-user-plus fa-lg"></i>Create Account
        </button>
        <button routerLink="/Signin" (click)="closeMenu()">
          <i class="fa-solid fa-right-to-bracket fa-lg"></i>Sign in
        </button>
      } @else {
        <button><img [src]="userImg" alt="User avatar" />{{userName}}</button>
        <button (click)="signOut()" routerLink="/">
          <i class="fa-solid fa-right-to-bracket"></i>Sign Out
        </button>
      }
    </div>
  </nav>
</div>
